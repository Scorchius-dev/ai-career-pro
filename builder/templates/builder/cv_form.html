{% extends 'builder/index.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Create Your CV</h2>
                <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <hr>
                <button type="submit" class="btn btn-success w-100">Save CV to Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
