{% extends 'builder/index.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card shadow-sm p-4 mt-5">
        <h3 class="mb-1">Create Your Account</h3>
        <p class="text-muted small mb-3">Save CVs, generate letters, and track your application-ready documents.</p>
        <form method="post" id="signup-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100" id="signup-btn">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>
<script>
    const signupForm = document.getElementById('signup-form');
    const signupBtn = document.getElementById('signup-btn');
    if (signupForm && signupBtn) {
        signupForm.addEventListener('submit', () => {
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';
        });
    }
</script>
{% endblock %}
