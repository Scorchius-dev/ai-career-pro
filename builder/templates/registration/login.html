{% extends 'builder/index.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card shadow-sm p-4 mt-5">
        <h3 class="mb-1">Welcome Back</h3>
        <p class="text-muted small mb-3">Continue building tailored applications in minutes.</p>
        <form method="post" id="login-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100" id="login-btn">Login</button>
        </form>
        <p class="mt-3">New here? <a href="{% url 'signup' %}">Create an account</a></p>
    </div>
</div>
<script>
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    if (loginForm && loginBtn) {
        loginForm.addEventListener('submit', () => {
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
        });
    }
</script>
{% endblock %}
