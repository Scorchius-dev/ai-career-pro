{% extends 'builder/index.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 card shadow-sm p-4 mt-5">
        <h3>Login</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>
        <p class="mt-3">New here? <a href="{% url 'signup' %}">Create an account</a></p>
    </div>
</div>
{% endblock %}
